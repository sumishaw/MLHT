plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.example.nihongolens'
    compileSdk 35

    defaultConfig {
        applicationId "com.example.nihongolens"
        minSdk 29          // API 29 = Android 10, required for AudioPlaybackCaptureConfiguration
        targetSdk 35
        versionCode 8
        versionName "8.0"
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = '17' }

    packagingOptions {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
            ]
        }
    }
}

flutter { source '../..' }

dependencies {
    // Vosk and ML Kit removed — ASR handled by faster-whisper via whisper_server.py
    // LibreTranslate and Whisper use plain HttpURLConnection — no extra dependency needed
    implementation 'androidx.multidex:multidex:2.0.1'
}
